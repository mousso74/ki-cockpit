<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asinito - Archiv</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/archiv.css?v=4.2">
    <link rel="icon" type="image/png" href="Asinito-Logo.png">
</head>
<body class="archiv-page">
    <header>
        <div class="header-left">
            <a href="index.html">
                <img src="Asinito-Logo.png" alt="Asinito" class="logo">
            </a>
        </div>
        <nav class="header-nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="extended.html" class="nav-link">Erweitert</a>
            <a href="archiv.html" class="nav-link active">Archiv</a>
        </nav>
    </header>

    <div class="archiv-layout">

        <!-- ========== LEFT PANEL ========== -->
        <aside class="left-panel">

            <!-- Filters -->
            <div class="filter-section">
                <div class="filter-group">
                    <label for="filterCategory">Kategorie</label>
                    <select id="filterCategory">
                        <option value="">Alle</option>
                        <option value="privat">Privat</option>
                        <option value="geschäftlich">Geschäftlich</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterProject">Projekt</label>
                    <div class="filter-project-row">
                        <select id="filterProject">
                            <option value="">Alle Projekte</option>
                        </select>
                        <button
                            id="btnDeleteProject"
                            class="btn-delete-project hidden"
                            onclick="deleteProject()"
                            title="Leeres Projekt löschen">🗑</button>
                    </div>
                </div>
            </div>

            <!-- Search (visible only when category + project selected) -->
            <div class="filter-group filter-search hidden" id="searchGroup">
                <label for="searchInput">Suche in Titeln</label>
                <div class="search-input-wrap">
                    <input type="search" id="searchInput" placeholder="Schlagwort eingeben…" autocomplete="off">
                    <span class="search-icon">🔍</span>
                </div>
            </div>

            <!-- List Header -->
            <div class="list-header">
                <span id="sessionCount" class="session-count">–</span>
                <button class="btn-icon-refresh" onclick="refreshSessions()" title="Aktualisieren">↻</button>
            </div>

            <!-- Session List -->
            <div id="sessionList" class="session-list">
                <div class="loading-indicator">
                    <div class="spinner"></div>
                    <span>Sessions werden geladen…</span>
                </div>
            </div>

        </aside>

        <!-- ========== RIGHT PANEL ========== -->
        <main class="right-panel">

            <!-- Placeholder -->
            <div class="right-placeholder" id="rightPlaceholder">
                <div class="placeholder-icon">📂</div>
                <p>Session aus der Liste auswählen</p>
            </div>

            <!-- Loading -->
            <div class="right-loading hidden" id="rightLoading">
                <div class="spinner"></div>
                <span>Wird geladen…</span>
            </div>

            <!-- Session Detail -->
            <div class="session-detail hidden" id="sessionDetail">

                <div class="detail-header">
                    <h2 id="detailTitle"></h2>
                    <div class="detail-meta">
                        <span class="badge badge-privat" id="detailCategory">privat</span>
                        <span class="badge badge-secondary" id="detailProject"></span>
                        <span class="detail-date" id="detailDate"></span>
                    </div>
                </div>

                <div class="detail-fields">
                    <div class="detail-field">
                        <label>Problemstellung</label>
                        <textarea id="detailProblem" readonly rows="7" placeholder="Kein Problem gespeichert"></textarea>
                    </div>
                    <div class="detail-field">
                        <label>Synthese</label>
                        <textarea id="detailSynthesis" readonly rows="12" placeholder="Keine Synthese vorhanden"></textarea>
                    </div>
                </div>

                <div class="detail-copy-actions">
                    <button class="btn btn-secondary" onclick="copyAsMarkdown()">
                        <span>📋</span> Als Markdown kopieren
                    </button>
                    <button class="btn btn-secondary" onclick="copyAsTxt()">
                        <span>📄</span> Als TXT kopieren
                    </button>
                </div>

            </div>
        </main>
    </div>

    <!-- Datalist for project autocomplete -->
    <datalist id="allProjectsList"></datalist>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="js/storage.js?v=3.7"></script>
    <script src="js/archiv.js?v=4.0"></script>
</body>
</html>
